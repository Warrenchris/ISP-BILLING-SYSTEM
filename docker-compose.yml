# version: '3.8' (Obsolete in newer Docker Compose)

services:
  backend:
    build:
      context: ./isp-billing-system-BACKEND
    container_name: isp-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=isp_billing_db
      - JWT_SECRET=isp_billing_secure_secret_key_2025
      - JWT_EXPIRES_IN=7d
      - AI_SERVICE_URL=http://ai-service:5001
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started
    volumes:
      - ./isp-billing-system-BACKEND:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - isp-network

  ai-service:
    build: ./ai-service
    container_name: isp-ai-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - FLASK_DEBUG=false
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=isp_billing_db
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-llama3-8b-8192}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ai_model_data:/app/data
    restart: unless-stopped
    networks:
      - isp-network

  frontend:
    build:
      context: ./isp-billing-frontend
      dockerfile: Dockerfile.dev
    container_name: isp-frontend
    ports:
      - "3001:3000"
    volumes:
      - ./isp-billing-frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=/api
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=0
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - isp-network

  db:
    image: mysql:8.0
    container_name: isp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: isp_billing_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - isp-network
    restart: unless-stopped

networks:
  isp-network:
    driver: bridge

volumes:
  mysql_data:
  ai_model_data:

